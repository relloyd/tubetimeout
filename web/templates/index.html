<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TubeTimout</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="/static/script.js" defer></script>
</head>
<body>
<div class="container">
  <h1>TubeTimeout</h1>
  <table>
    <thead>
    <tr>
      <th>Key</th>
      <th>Value</th>
      <th>Say What?</th>
    </tr>
    </thead>
    <tbody>
    <tr>
      <td>Build Time</td>
      <td>{{.BuildTime}}</td>
      <td>App build time</td>
    </tr>
    <tr>
      <td>App Version</td>
      <td>{{.BuildVersion}}</td>
      <td>App version</td>
    </tr>
    </tbody>
  </table>
</div>

<!-- Global status message -->
<div id="statusMessage"></div>

<div class="container">
  <section>
    <h1>Usage Tracker Groups</h1>
    <form id="group-config-form">
      <div class="table-responsive">
        <table>
          <thead>
          <tr>
            <th>Tracker</th>
            <th>Name</th>
            <th>Retention (days)</th>
            <th>Block Threshold (minutes)</th>
            <th>Start Day</th>
            <th>Start Time</th>
          </tr>
          </thead>
          <tbody>
          <tr>
            <td>
              <label for="group-select"></label>
              <select id="group-select">
                <option value="">-- New Tracker --</option>
              </select>
            </td>
            <td>
              <label for="group-name"></label>
              <input id="group-name" type="text" placeholder="Name" required />
            </td>
            <td>
              <label for="group-retention"></label>
              <input id="group-retention" type="number" placeholder="Retention" required />
            </td>
            <td>
              <label for="group-threshold"></label>
              <input id="group-threshold" type="number" placeholder="Threshold" required />
            </td>
            <td>
              <label for="group-start-day"></label>
              <select id="group-start-day">
                <option value="0">Sunday</option>
                <option value="1">Monday</option>
                <option value="2">Tuesday</option>
                <option value="3">Wednesday</option>
                <option value="4">Thursday</option>
                <option value="5">Friday</option>
                <option value="6">Saturday</option>
              </select>
            </td>
            <td>
              <label for="group-start-time"></label><input id="group-start-time" type="time" step="300" required />
            </td>
          </tr>
          </tbody>
        </table>
      </div>
      <button type="button" id="save-group-btn">Save Tracker</button>
    </form>
  </section>

  <section>
    <h1>Devices</h1>
    <table>
      <thead>
      <tr>
        <th>Device</th>
        <th>Name</th>
        <th>Group</th>
      </tr>
      </thead>
      <tbody>
      <tr>
        <td><label for="device-dropdown"></label><select id="device-dropdown"></select></td>
        <td><label for="device-name"></label><input id="device-name" type="text" placeholder="Device Name" /></td>
        <td><label for="device-group-dropdown"></label><select id="device-group-dropdown"></select></td>
        <td><button id="add-to-group-btn" type="button">Add to Group</button></td>
      </tr>
      </tbody>
    </table>
  </section>

  <div class="save-container">
    <button id="save-config-btn" style="display: none;">Save Configuration</button>
  </div>

  <div id="groups-container"></div>

  <div id="notification" class="notification hidden"></div>
</div>
</body>
</html>
