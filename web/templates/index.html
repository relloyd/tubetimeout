<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Configuration</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="/static/script.js" defer></script>
</head>
<body>
<div class="container">
  <h1>TubeTimeout Configuration</h1>
  <table>
    <thead>
    <tr>
      <th>Key</th>
      <th>Value</th>
      <th>Say What?</th>
    </tr>
    </thead>
    <tbody>
    <tr>
      <td>Build Time</td>
      <td>{{.BuildTime}}</td>
      <td>App build time</td>
    </tr>
    <tr>
      <td>App Version</td>
      <td>{{.BuildVersion}}</td>
      <td>App version</td>
    </tr>
    </tbody>
  </table>
</div>

<!-- Buttons Section -->
<div class="button-container">
  <button id="addButton">Pause (60 minutes)</button>
  <button id="resetButton">Resume</button>
</div>

<div id="statusMessage"></div>

<div class="container">
  <h1>Device Groups</h1>

  <!-- Form to Add New Group with tracker configuration -->
  <section>
    <form id="add-group-form">
      <input id="new-group-name" type="text" placeholder="New Group Name" required />
      <input id="group-retention" type="number" placeholder="Retention (days)" required />
      <select id="group-start-day">
        <option value="0">Sunday</option>
        <option value="1">Monday</option>
        <option value="2">Tuesday</option>
        <option value="3">Wednesday</option>
        <option value="4">Thursday</option>
        <option value="5">Friday</option>
        <option value="6">Saturday</option>
      </select>
      <input id="group-start-time" type="time" required />
      <button type="submit">Add</button>
    </form>
  </section>

  <!-- New form for Editing an Existing Group's tracker configuration -->
  <section>
    <h2>Edit Group Configuration</h2>
    <form id="edit-group-form">
      <select id="edit-group-dropdown"></select>
      <input id="edit-group-retention" type="number" placeholder="Retention (days)" required />
      <select id="edit-group-start-day">
        <option value="0">Sunday</option>
        <option value="1">Monday</option>
        <option value="2">Tuesday</option>
        <option value="3">Wednesday</option>
        <option value="4">Thursday</option>
        <option value="5">Friday</option>
        <option value="6">Saturday</option>
      </select>
      <input id="edit-group-start-time" type="time" required />
      <button type="button" id="update-group-btn">Update</button>
    </form>
  </section>

  <!-- Device assignment section -->
  <section>
    <h2>Assign Device to Group</h2>
    <select id="device-dropdown"></select>
    <input id="device-name" type="text" placeholder="Device Name" />
    <select id="group-dropdown"></select>
    <button id="add-to-group-btn" type="button">Add to Group</button>
  </section>

  <div class="save-container">
    <button id="save-config-btn" style="display: none;">Save Configuration</button>
  </div>

  <!-- Container for rendered groups -->
  <div id="groups-container"></div>

  <div id="notification" class="notification hidden"></div>
</div>
</body>
</html>
