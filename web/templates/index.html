<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Configuration</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="/static/script.js" defer></script>
</head>
<body>
<div class="container">
  <h1>TubeTimeout Configuration</h1>
  <table>
    <thead>
    <tr>
      <th>Key</th>
      <th>Value</th>
      <th>Say What?</th>
    </tr>
    </thead>
    <tbody>
    <tr>
      <td>Build Time</td>
      <td>{{.BuildTime}}</td>
      <td>App build time</td>
    </tr>
    <tr>
      <td>App Version</td>
      <td>{{.BuildVersion}}</td>
      <td>App version</td>
    </tr>
    </tbody>
  </table>
</div>

<!-- Buttons Section -->
<div class="button-container">
  <button id="addButton">Pause (60 minutes)</button>
  <button id="resetButton">Resume</button>
</div>

<div id="statusMessage"></div>

<div class="container">
  <h1>Device Groups</h1>

  <!-- Consolidated Group Configuration Form -->
  <section>
    <h2>Group Configuration</h2>
    <form id="group-config-form">
      <label for="group-select">Select Group:</label>
      <select id="group-select"></select>

      <label for="group-name">Group Name:</label>
      <input id="group-name" type="text" placeholder="Group Name" required />

      <label for="group-retention">Retention (days):</label>
      <input id="group-retention" type="number" placeholder="Retention (days)" required />

      <label for="group-start-day">Start Day:</label>
      <select id="group-start-day">
        <option value="0">Sunday</option>
        <option value="1">Monday</option>
        <option value="2">Tuesday</option>
        <option value="3">Wednesday</option>
        <option value="4">Thursday</option>
        <option value="5">Friday</option>
        <option value="6">Saturday</option>
      </select>

      <label for="group-start-time">Start Time:</label>
      <input id="group-start-time" type="time" required />

      <button type="button" id="save-group-btn">Save Group Configuration</button>
    </form>
  </section>

  <!-- Device Assignment Section -->
  <section>
    <h2>Assign Device to Group</h2>
    <select id="device-dropdown"></select>
    <input id="device-name" type="text" placeholder="Device Name" />
    <select id="device-group-dropdown"></select>
    <button id="add-to-group-btn" type="button">Add to Group</button>
  </section>

  <div class="save-container">
    <button id="save-config-btn" style="display: none;">Save Configuration</button>
  </div>

  <!-- Container for Rendered Groups -->
  <div id="groups-container"></div>

  <div id="notification" class="notification hidden"></div>
</div>
</body>
</html>
